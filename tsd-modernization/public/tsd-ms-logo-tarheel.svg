<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320">
  <title>TSD Modernization Solutions</title>

  <!-- 4-slab prism, centered. Mirrors the nav logo: skewX(-12), 4 rectangles
       with a Carolina-blue gradient from light to dark across the slabs. -->
  <g transform="translate(225 40) skewX(-12)">
    <rect x="0"   y="0" width="76" height="160" rx="4" fill="#a8d1ed"/>
    <rect x="76"  y="0" width="76" height="160" rx="4" fill="#7BB8E0"/>
    <rect x="152" y="0" width="76" height="160" rx="4" fill="#2c5f8a"/>
    <rect x="228" y="0" width="76" height="160" rx="4" fill="#13294B"/>
  </g>

  <!-- T S D letters in white over slabs 1-3 -->
  <g font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-weight="700" fill="#fff" letter-spacing="3">
    <text x="255" y="150" font-size="66">T</text>
    <text x="331" y="150" font-size="66">S</text>
    <text x="407" y="150" font-size="66">D</text>
  </g>

  <!-- Wordmark: MODERNIZATION / SOLUTIONS, dark-theme color treatment -->
  <g transform="translate(360 240)">
    <line x1="-160" y1="0" x2="160" y2="0" stroke="#7BB8E0" stroke-opacity="0.45" stroke-width="1"/>
    <text x="0" y="26" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#a8d1ed" letter-spacing="7" text-anchor="middle">MODERNIZATION</text>
    <text x="0" y="50" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="500" fill="#7BB8E0" letter-spacing="9.5" text-anchor="middle">SOLUTIONS</text>
  </g>
</svg>

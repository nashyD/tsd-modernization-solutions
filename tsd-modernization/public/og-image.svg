<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#7BB8E0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background: dark navy with subtle grid and centered glow -->
  <rect width="1200" height="630" fill="#0c1524"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- 4-slab prism centered, scaled 2.2x from the standard 720x320 logo proportions -->
  <g transform="translate(225 90) scale(2.2)">
    <g transform="skewX(-12)">
      <rect x="0"   y="0" width="76" height="160" rx="4" fill="#a8d1ed"/>
      <rect x="76"  y="0" width="76" height="160" rx="4" fill="#7BB8E0"/>
      <rect x="152" y="0" width="76" height="160" rx="4" fill="#2c5f8a"/>
      <rect x="228" y="0" width="76" height="160" rx="4" fill="#13294B"/>
    </g>
    <g font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-weight="700" fill="#fff" letter-spacing="3">
      <text x="30" y="110" font-size="66">T</text>
      <text x="106" y="110" font-size="66">S</text>
      <text x="182" y="110" font-size="66">D</text>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark backdrop so the icon reads on light and dark browser chrome -->
  <rect width="64" height="64" rx="12" fill="#0c1524"/>

  <!-- 4-slab prism with skewX, mirroring the nav logo -->
  <g transform="translate(11 18) skewX(-12)">
    <rect x="0"  y="0" width="12" height="28" rx="1.5" fill="#a8d1ed"/>
    <rect x="12" y="0" width="12" height="28" rx="1.5" fill="#7BB8E0"/>
    <rect x="24" y="0" width="12" height="28" rx="1.5" fill="#2c5f8a"/>
    <rect x="36" y="0" width="12" height="28" rx="1.5" fill="#13294B"/>
  </g>

  <!-- T S D letters, white, over slabs 1-3 -->
  <g font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-weight="700" fill="#fff" text-anchor="middle">
    <text x="14" y="37" font-size="11">T</text>
    <text x="26" y="37" font-size="11">S</text>
    <text x="38" y="37" font-size="11">D</text>
  </g>
</svg>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Per-route <title>, <meta name="description">, <link rel="canonical">,
         og:title/description/url, twitter:title/description are injected per
         route at SSG build time via <Head> in Layout.jsx. See ROUTE_META. -->

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph — site-level statics (image/type/site_name) shared across routes -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TSD Modernization Solutions" />
    <meta property="og:image" content="https://tsd-modernization.com/og-image.png" />
    <meta property="og:image:secure_url" content="https://tsd-modernization.com/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="TSD Modernization Solutions" />

    <!-- Twitter / X card — statics -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://tsd-modernization.com/og-image.png" />

    <!-- LocalBusiness structured data — powers Google's knowledge panel on brand searches
         and local-pack results for "AI integration charlotte", etc. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "@id": "https://tsd-modernization.com/#business",
      "name": "TSD Modernization Solutions",
      "legalName": "TSD Modernization Solutions, a division of TSD Incorporated, LLC",
      "url": "https://tsd-modernization.com/",
      "logo": "https://tsd-modernization.com/tsd-ms-logo.svg",
      "image": "https://tsd-modernization.com/og-image.png",
      "description": "Affordable AI integration, custom website creation, and workflow automation for small businesses in the Charlotte, NC metro area.",
      "telephone": "+1-704-275-1410",
      "priceRange": "$150 - $1800",
      "areaServed": [
        { "@type": "City", "name": "Charlotte", "containedInPlace": { "@type": "State", "name": "North Carolina" } },
        { "@type": "City", "name": "Gastonia", "containedInPlace": { "@type": "State", "name": "North Carolina" } },
        { "@type": "City", "name": "Belmont", "containedInPlace": { "@type": "State", "name": "North Carolina" } }
      ],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Charlotte",
        "addressRegion": "NC",
        "addressCountry": "US"
      },
      "founder": [
        { "@type": "Person", "name": "Nash Davis", "jobTitle": "CEO" },
        { "@type": "Person", "name": "Bishop Switzer", "jobTitle": "COO" },
        { "@type": "Person", "name": "Grant Tadlock", "jobTitle": "CFO" }
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Small Business Modernization Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "AI Integration & Automation",
              "description": "Practical AI tool integration and workflow automation for small businesses."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Website Creation & Redesign",
              "description": "Custom websites designed and built for small businesses at main-street prices."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Process Modernization",
              "description": "End-to-end tech audits, training, and modernization for legacy small business operations."
            }
          }
        ]
      }
    }
    </script>

    <!-- Apply saved theme before paint to avoid a flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("tsd-theme");
          if (t === "light" || t === "dark") {
            document.documentElement.dataset.theme = t;
          } else {
            document.documentElement.dataset.theme = "dark";
          }
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
